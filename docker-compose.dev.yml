version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: backend-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run dev

    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_USER=admin
      - DB_PASSWORD=1234
      - DB_CONNECTION_STRING=host.docker.internal:1521/orcl
    stdin_open: true
    tty: true