version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: backend-dev
    ports:
      - "4000:4000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run dev

    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DB_USER=root
      - DB_PASSWORD=123
      - DB_CONNECTION_STRING=host.docker.internal:1521/orcl